model:
  name: shibing624/text2vec-base-chinese-sentence
  cache_dir: ./models
  device: cpu

index:
  path: ./data/faiss_index
  top_k: 5

thresholds:
  auto_map: 0.95
  need_review: 0.80

data:
  standard_dict: ./data/standard_dict.csv
  alias_dict: ./data/alias_dict.csv
  input_dir: ./data/input
  output_dir: ./data/output

departments:
  whitelist:
    - HY
    - YB
    - ER
  blacklist:
    - WZ
    - EY
    - EZ

preprocessing:
  deduplicate: true
  parse_result_value: true
