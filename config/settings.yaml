model:
  name: shibing624/text2vec-base-chinese-sentence
  cache_dir: ./models
  device: cpu

index:
  path: ./data/faiss_index
  top_k: 5

thresholds:
  auto_map: 0.95
  need_review: 0.80

data:
  standard_dict: ./data/standard_dict.csv
  alias_dict: ./data/alias_dict.csv
  major_item_dict: ./data/major_item_dict.csv
  input_dir: ./data/input
  output_dir: ./data/output

departments:
  whitelist:
    - HY
    - YB
    - ER
  blacklist:
    - WZ
    - EY
    - EZ

preprocessing:
  deduplicate: true
  parse_result_value: true
  strict: true

ai_review:
  enabled: true
  model: doubao-seed-2-0-pro-260215

database:
  host: rm-2ze7k76808sos442l.mysql.rds.aliyuncs.com
  user: klb_0418
  password: ${DB_PASSWORD}
  database: dc_ods
  charset: utf8mb4
  dept_tables:
    HY: {table: ods_tj_hyb, result_col: ItemResult, unit_col: ItemUnit, ref_col: DefValue, flag_col: Flag}
    YB: {table: ods_tj_ybb, result_col: CValue}
    ER: {table: ods_tj_erb, result_col: CValue}
    NK: {table: ods_tj_nkb, result_col: CValue}
    WK: {table: ods_tj_wkb, result_col: CValue}
    FK: {table: ods_tj_fkb, result_col: CValue}
